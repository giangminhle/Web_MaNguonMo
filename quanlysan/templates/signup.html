{% load static %}
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Tham gia Sân 333</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #f5f6f8;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        min-height: 100vh;
      }
      .auth-card {
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        max-width: 450px;
        width: 90%;
        margin: auto;
      }
      .auth-header {
        background: #00b14f;
        color: white;
        padding: 30px;
        text-align: center;
      }
      .auth-body {
        padding: 30px;
      }
      .btn-signup {
        background: #00b14f;
        color: white;
        border: none;
        font-weight: bold;
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        transition: 0.3s;
      }
      .btn-signup:hover {
        background: #008f3f;
        color: white;
        transform: translateY(-2px);
      }
      .form-control {
        border-radius: 8px;
        background: #f8f9fa;
        border: 1px solid #eee;
        padding: 12px;
      }
      .form-control:focus {
        box-shadow: 0 0 0 3px rgba(0, 177, 79, 0.1);
        border-color: #00b14f;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="auth-header">
        <h3 class="fw-bold mb-0">
          <i class="fas fa-user-plus me-2"></i>ĐĂNG KÝ THÀNH VIÊN
        </h3>
        <small class="opacity-75">Gia nhập cộng đồng Sân Thể Thao 333</small>
      </div>
      <div class="auth-body">
        <form method="POST">
          {% csrf_token %} {% for field in form %}
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted"
              >{{ field.label }}</label
            >
            {{ field }} {% if field.errors %}
            <small class="text-danger">{{ field.errors.0 }}</small>
            {% endif %}
          </div>
          {% endfor %}

          <button type="submit" class="btn btn-signup mt-3">
            TẠO TÀI KHOẢN NGAY
          </button>

          <div class="text-center mt-4">
            <span class="small text-muted">Đã có tài khoản?</span>
            <a
              href="{% url 'login' %}"
              class="small text-success fw-bold text-decoration-none ms-1"
              >Đăng nhập ngay</a
            >
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
