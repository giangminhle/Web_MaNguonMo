<!DOCTYPE html>
<html>
<head><title>Đăng Nhập - Sân 333</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow border-0 p-4" style="width: 400px; border-radius: 12px; margin: 0 15px;">
        <h3 class="text-center mb-4 text-success fw-bold">🔐 Đăng Nhập</h3>
        
        <form method="POST">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="alert alert-danger p-2 small">{{ form.non_field_errors.0 }}</div>
            {% endif %}
            {{ form.as_p }}
            <script>document.querySelectorAll('input').forEach(e => e.classList.add('form-control'));</script>
            <button class="btn btn-success w-100 fw-bold py-2 mt-2">Đăng Nhập</button>
        </form>
        
        <div class="text-center mt-3 mb-2">
            <a href="{% url 'password_reset' %}" class="small text-danger fw-bold text-decoration-none">Bạn quên mật khẩu?</a>
        </div>
        
        <div class="text-center mt-4">
            <span class="small text-muted">Chưa có tài khoản?</span>
            <a href="{% url 'signup' %}" class="small text-primary fw-bold text-decoration-none ms-1">Đăng ký ngay</a>
        </div>
        <div class="text-center mt-2"><a href="{% url 'home' %}" class="small text-secondary text-decoration-none"><i class="fas fa-arrow-left"></i> Về trang chủ</a></div>
    </div>
</body>
</html>
