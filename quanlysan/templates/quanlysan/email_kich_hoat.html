<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .container { font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { text-align: center; border-bottom: 2px solid #00b14f; padding-bottom: 10px; }
        .content { padding: 20px; color: #333; line-height: 1.6; }
        .btn-box { text-align: center; margin: 30px 0; }
        .btn { background-color: #f7a800; color: #000 !important; padding: 12px 30px; text-decoration: none; font-weight: bold; border-radius: 50px; display: inline-block; }
        .footer { font-size: 12px; color: #888; text-align: center; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="color: #00b14f; margin: 0;">CHÀO MỪNG ĐẾN VỚI SÂN 333</h2>
        </div>
        <div class="content">
            <p>Xin chào <strong>{{ user.last_name }} {{ user.first_name }}</strong>,</p>
            <p>Cảm ơn bạn đã gia nhập cộng đồng đặt sân bóng lớn nhất khu vực. Để bắt đầu sử dụng dịch vụ, vui lòng xác nhận tài khoản bằng nút bên dưới:</p>
            
            <div class="btn-box">
                <a href="http://{{ domain }}{% url 'kich_hoat_tai_khoan' uidb64=uid token=token %}" class="btn">
                    XÁC NHẬN TÀI KHOẢN
                </a>
            </div>
            
            <p>Trân trọng,<br>Đội ngũ Quản lý Sân 333.</p>
        </div>
    </div>
</body>
</html>
