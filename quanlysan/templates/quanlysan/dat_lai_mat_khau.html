<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Đặt lại mật khẩu - Sân 333</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow border-0 p-4" style="width: 400px; border-radius: 12px; margin: 15px;">
        <h4 class="text-center mb-4 fw-bold text-success">Tạo Mật Khẩu Mới</h4>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                    {% endif %}
                    {% if field.help_text %}
                        <div class="text-muted" style="font-size: 11px;">{{ field.help_text|safe }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <script>document.querySelectorAll('input').forEach(e => e.classList.add('form-control'));</script>
            
            <button class="btn btn-warning text-dark w-100 fw-bold py-2 mt-2">XÁC NHẬN ĐỔI MẬT KHẨU</button>
        </form>
    </div>
</body>
</html>
