<!DOCTYPE html>
<html lang="vi">
<head>
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow border-0 p-5 text-center" style="border-radius: 15px; max-width: 450px; width: 90%;">
        {% if is_success %}
            <i class="fas fa-check-circle text-success mb-3" style="font-size: 60px;"></i>
        {% else %}
            <i class="fas fa-envelope-open-text text-warning mb-3" style="font-size: 60px;"></i>
        {% endif %}
        
        <h4 class="fw-bold text-dark">{{ title }}</h4>
        <p class="text-secondary mt-2 mb-4">{{ message }}</p>
        
        <a href="{% url 'login' %}" class="btn btn-success fw-bold w-100 rounded-pill mb-2 py-2">Đi tới Đăng nhập</a>
        <a href="{% url 'home' %}" class="small text-secondary text-decoration-none">Về trang chủ</a>
    </div>
</body>
</html>
