<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Đổi Mật Khẩu - Sân 333</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { background-color: #f5f6f8; font-family: "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); overflow: hidden; max-width: 450px; width: 90%; }
        .auth-header { background: #f7a800; color: white; padding: 20px; text-align: center; }
        .auth-body { padding: 30px; }
        .form-control { border-radius: 8px; background: #f8f9fa; border: 1px solid #eee; padding: 12px; }
        .btn-save { background: #f7a800; color: #fff; font-weight: bold; width: 100%; padding: 12px; border: none; border-radius: 8px; transition: 0.3s; }
        .btn-save:hover { background: #e09600; }
        ul.errorlist { color: #dc3545; list-style: none; padding-left: 0; font-size: 13px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header"><h4 class="fw-bold mb-0"><i class="fas fa-key me-2"></i>ĐỔI MẬT KHẨU</h4></div>
        <div class="auth-body">
            <form method="POST">
                {% csrf_token %}
                {% if form.non_field_errors %}
                <div class="alert alert-danger py-2 small fw-bold">{{ form.non_field_errors.0 }}</div>
                {% endif %}

                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                    {{ field }} 
                    {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
                    {% if field.help_text %}<small class="text-muted d-block mt-1" style="font-size: 11px;">{{ field.help_text|safe }}</small>{% endif %}
                </div>
                {% endfor %}

                <script>document.querySelectorAll('input').forEach(e => e.classList.add('form-control'));</script>
                <button type="submit" class="btn-save mt-3"><i class="fas fa-save me-1"></i> LƯU THAY ĐỔI</button>
                <div class="text-center mt-3"><a href="{% url 'ho_so' %}" class="small text-secondary text-decoration-none"><i class="fas fa-times me-1"></i>Hủy bỏ</a></div>
            </form>
        </div>
    </div>
</body>
</html>
