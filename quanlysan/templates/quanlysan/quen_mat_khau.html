<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Quên mật khẩu - Sân 333</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow border-0 p-4" style="width: 400px; border-radius: 12px; margin: 15px;">
        <div class="text-center mb-4">
            <i class="fas fa-key text-warning mb-3" style="font-size: 40px;"></i>
            <h4 class="fw-bold text-success">Lấy lại mật khẩu</h4>
            <p class="text-muted small">Nhập email đã đăng ký, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu cho bạn.</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <script>document.querySelectorAll('input').forEach(e => e.classList.add('form-control'));</script>
            
            <button class="btn btn-success w-100 fw-bold py-2 mt-2">Gửi yêu cầu</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="small text-secondary text-decoration-none">Quay lại Đăng nhập</a>
        </div>
    </div>
</body>
</html>
