<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>404 - Không tìm thấy trang</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6f8; font-family: "Segoe UI", sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .error-card { background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #00b14f; }
        .error-code { font-size: 80px; font-weight: 900; color: #00b14f; line-height: 1; margin-bottom: 10px; }
        .ghost-icon { font-size: 50px; color: #e9ecef; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="fas fa-ghost ghost-icon fa-bounce"></i>
        <div class="error-code">404</div>
        <h4 class="fw-bold text-dark mb-2">Ối! Lạc đường rồi</h4>
        <p class="text-secondary mb-4 small">Trang bạn đang tìm kiếm không tồn tại, đã bị đổi tên hoặc gỡ bỏ.</p>
        <a href="{% url 'home' %}" class="btn btn-success fw-bold w-100 rounded-pill py-2">
            <i class="fas fa-home me-2"></i> Về Trang Chủ
        </a>
    </div>
</body>
</html>
