{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa Thành Viên - Sân 333</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm" style="border-radius: 15px;">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-4">
                            <a href="{% url 'quan_ly_thanh_vien' %}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
                            <h4 class="mb-0 fw-bold">Thiết lập quyền hạn</h4>
                        </div>

                        <form method="POST">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="small fw-bold">Họ</label>
                                    {{ form.first_name }}
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="small fw-bold">Tên</label>
                                    {{ form.last_name }}
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="small fw-bold">Email</label>
                                {{ form.email }}
                            </div>

                            <hr class="my-4">
                            <h6 class="fw-bold text-danger mb-3"><i class="fas fa-user-shield me-2"></i>PHÂN QUYỀN (ROLE)</h6>
                            
                            <div class="bg-light p-3 rounded border">
                                <div class="form-check mb-2">
                                    {{ form.is_active }}
                                    <label class="form-check-label ms-2">Kích hoạt tài khoản</label>
                                </div>
                                <div class="form-check mb-2">
                                    {{ form.is_staff }}
                                    <label class="form-check-label ms-2 text-primary fw-bold">Nhân viên (Vào được Admin)</label>
                                </div>
                                <div class="form-check">
                                    {{ form.is_superuser }}
                                    <label class="form-check-label ms-2 text-danger fw-bold">Quản lý tối cao (Toàn quyền)</label>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-success w-100 fw-bold py-2 rounded-pill">LƯU THAY ĐỔI</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
