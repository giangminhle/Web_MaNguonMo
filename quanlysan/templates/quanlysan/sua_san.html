<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa Sân Con</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-light container mt-5 pb-5">
    <div class="card shadow-lg border-0" style="max-width: 800px; margin: auto; border-radius: 12px;">
        <div class="card-header bg-warning text-dark py-3">
            <h4 class="mb-0 fw-bold">✏️ Sửa Thông Tin Sân Con</h4>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="fw-bold small text-muted">Thuộc cụm sân:</label>
                    {{ form.dia_diem }}
                </div>

                <div class="row">
                    <div class="col-md-5 mb-3">
                        <label class="fw-bold small text-muted">Tên Sân Con (Vd: Sân 1, Sân A):</label>
                        {{ form.ten_san }}
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="fw-bold small text-muted">Loại sân:</label>
                        {{ form.loai_san }}
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="fw-bold small text-muted">Giá Tiền (đ/h):</label>
                        {{ form.gia_tien }}
                    </div>
                </div>

                <div class="alert alert-info py-2 small mt-2 border-0">
                    <i class="fas fa-info-circle me-1"></i> <b>Lưu ý:</b> Hình ảnh và vị trí bản đồ của sân này được tự động lấy từ <b>Cụm sân cha</b>. Bạn chỉ cần sửa thông tin chi tiết tại đây.
                </div>

                <div class="mt-4 pt-3 border-top d-flex gap-2">
                    <button type="submit" class="btn btn-warning fw-bold px-4">CẬP NHẬT SÂN</button>
                    <a href="{% url 'home' %}" class="btn btn-light border px-4">HỦY</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
