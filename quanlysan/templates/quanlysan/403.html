<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>403 - Truy cập bị từ chối</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6f8; font-family: "Segoe UI", sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .error-card { background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #dc3545; }
        .error-code { font-size: 80px; font-weight: 900; color: #dc3545; line-height: 1; margin-bottom: 10px; }
        .lock-icon { font-size: 50px; color: #e9ecef; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="fas fa-lock lock-icon fa-shake"></i>
        <div class="error-code">403</div>
        <h4 class="fw-bold text-dark mb-2">Truy cập bị từ chối</h4>
        <p class="text-secondary mb-4 small">Bạn không có quyền hạn (Staff/Admin) để thực hiện thao tác hoặc xem khu vực này.</p>
        
        <a href="{% url 'home' %}" class="btn btn-danger fw-bold w-100 rounded-pill py-2 mb-2">
            <i class="fas fa-arrow-left me-2"></i> Quay Lại Trang Chủ
        </a>
        <a href="{% url 'login' %}" class="btn btn-outline-secondary fw-bold w-100 rounded-pill py-2">
            <i class="fas fa-user-shield me-2"></i> Đăng Nhập Tài Khoản Khác
        </a>
    </div>
</body>
</html>
